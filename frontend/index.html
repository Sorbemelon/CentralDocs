<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/brand/centraldocs_icon_light_transparent.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="CentralDocs — an AI document workspace for digital transformation. Manage documents, search by meaning, chat with selected sources, and turn conversations into downloadable documents."
    />
    <title>CentralDocs</title>
    <script>
      // Apply persisted theme before first paint to avoid a flash.
      (function () {
        try {
          var stored = localStorage.getItem("centraldocs-theme");
          var prefersDark =
            window.matchMedia &&
            window.matchMedia("(prefers-color-scheme: dark)").matches;
          var dark = stored ? stored === "dark" : false;
          if (dark) document.documentElement.classList.add("dark");
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
